services:
  - type: web
    name: ai-shield-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # If Render shows OOM errors -> drop to --workers 1 and add --timeout-keep-alive 5
    startCommand: "uvicorn api_server:app --host 0.0.0.0 --port $PORT --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
